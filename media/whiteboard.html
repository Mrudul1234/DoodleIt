<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<title>DoodleIt — Whiteboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Syne:wght@500;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── THEME TOKENS ── */
[data-theme="light"]{
  --bg:#eeedf5;--s:#ffffff;--s2:#f4f3fc;--s3:#eceafb;
  --bdr:#dddaf0;--bdr2:#bcb8e0;
  --tx:#1a1830;--tx2:#5a587a;--tx3:#9b99b8;
  --ac:#5b4fff;--ach:#4a3fe0;--ac2:#7b6fff;
  --dot1:#b8b4d8;--dot2:#d4d0ee;--dotbg:#eeedf5;
  --sh:rgba(91,79,255,.1);--sh2:rgba(0,0,0,.16);
  --tip-bg:#1a1830;--tip-tx:#fff;
}
[data-theme="dark"]{
  --bg:#1a1a1a;--s:#242424;--s2:#2e2e2e;--s3:#363636;
  --bdr:#333333;--bdr2:#484848;
  --tx:#e8e8e8;--tx2:#999999;--tx3:#555555;
  --ac:#7b6fff;--ach:#6a5ee0;--ac2:#9d94ff;
  --dot1:#333333;--dot2:#2a2a2a;--dotbg:#1a1a1a;
  --sh:rgba(0,0,0,0);--sh2:rgba(0,0,0,.3);
  --tip-bg:#e8e8e8;--tip-tx:#1a1a1a;
}

*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--tx);}
/* Fancy display text */
.fancy{font-family:'Syne',sans-serif;}

/* ── HEADER ── */
#hdr{
  position:fixed;inset:0 0 auto;height:48px;
  background:var(--s);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;padding:0 10px;gap:5px;
  z-index:600;
}

/* ── LOGO (pixel-art style matching icon) ── */
#logo{
  display:flex;align-items:center;gap:0;
  padding-right:14px;border-right:1px solid var(--bdr);
  margin-right:4px;flex-shrink:0;
}
#logo-text{
  font-family:'Syne',sans-serif;font-size:20px;font-weight:700;
  color:var(--ac);letter-spacing:-.5px;line-height:1;
}

#bname{
  font-family:'Syne',sans-serif;font-size:16px;font-weight:500;
  border:none;background:transparent;outline:none;
  color:var(--tx);padding:3px 8px;border-radius:7px;min-width:90px;
  transition:background .15s;
}
#bname:hover{background:var(--s2);}
#bname:focus{background:var(--s2);box-shadow:0 0 0 2px var(--ac)44;}

.sp{flex:1;}

.hb{
  height:30px;padding:0 11px;border:1px solid var(--bdr2);
  background:var(--s);border-radius:8px;
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;
  color:var(--tx2);cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:all .13s;white-space:nowrap;
}
.hb:hover{background:var(--s2);color:var(--tx);border-color:var(--ac)66;}
.hb.pri{background:var(--ac);color:#fff;border-color:var(--ac);}
.hb.pri:hover{background:var(--ach);}
.hb.sq{width:30px;padding:0;justify-content:center;}

/* ── TOOLBAR ── */
#tb{
  position:fixed;left:9px;top:50%;transform:translateY(-50%);z-index:500;
  background:var(--s);border:1px solid var(--bdr);border-radius:16px;
  padding:7px 5px;display:flex;flex-direction:column;gap:1px;
}
.tbt{
  width:40px;height:38px;border:none;border-radius:9px;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--tx3);transition:all .13s;position:relative;
}
.tbt:hover{background:var(--s2);color:var(--tx);}
.tbt.on{background:var(--s3);color:var(--ac);}
.tbt svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.tsep{height:1px;background:var(--bdr);margin:3px 2px;}
.tt{
  position:absolute;left:calc(100% + 9px);top:50%;transform:translateY(-50%);
  background:var(--tip-bg);color:var(--tip-tx);
  font-family:'Space Grotesk',sans-serif;font-size:11px;padding:4px 9px;border-radius:6px;
  white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .1s;z-index:9999;
  box-shadow:0 4px 12px var(--sh2);
}
.tt::before{
  content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);
  border:4px solid transparent;border-right-color:var(--tip-bg);
}
.tbt:hover .tt{opacity:1;}
#col-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid var(--bdr2);transition:background .15s;}

/* ── VIEWPORT ── */
#vp{position:fixed;top:48px;left:0;right:0;bottom:0;overflow:hidden;touch-action:none;}
#board{position:absolute;top:0;left:0;transform-origin:0 0;width:6000px;height:6000px;}
#cv{position:absolute;top:0;left:0;width:6000px;height:6000px;pointer-events:none;}
#lsvg{position:absolute;top:0;left:0;width:6000px;height:6000px;pointer-events:none;z-index:10;overflow:visible;}
#ol{position:absolute;top:0;left:0;width:6000px;height:6000px;z-index:20;}
#rb{position:absolute;border:1.5px solid var(--ac);background:var(--ac)0a;display:none;pointer-events:none;z-index:30;border-radius:3px;}

/* ── DOM OBJECTS ── */
.ob{position:absolute;cursor:default;user-select:none;}
.ob.sel>.oi{outline:2px solid var(--ac);outline-offset:2px;}

/* sticky note */
.sn{
  border-radius:2px 12px 12px 12px;padding:10px 10px 8px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);
  display:flex;flex-direction:column;gap:3px;height:100%;
}
.sn:hover{box-shadow:0 4px 14px rgba(0,0,0,.2);}
.sn-ta{
  flex:1;background:transparent;border:none;outline:none;
  font-family:'Caveat',cursive;font-size:16px;font-weight:500;
  line-height:1.6;resize:none;color:inherit;width:100%;min-height:80px;
}
.sn-foot{display:flex;justify-content:flex-end;padding-top:2px;}
.sn-dot{width:12px;height:12px;border-radius:50%;cursor:pointer;opacity:.45;border:1.5px solid rgba(0,0,0,.15);transition:opacity .12s,transform .12s;}
.sn-dot:hover{opacity:1;transform:scale(1.25);}

/* shape */
.sh{overflow:hidden;height:100%;}
.sh svg{width:100%;height:100%;display:block;}

/* text */
.tx-ta{
  background:transparent;border:none;outline:none;
  font-family:'Caveat',cursive;font-size:20px;font-weight:500;
  resize:none;width:100%;height:100%;padding:3px 5px;cursor:default;
  line-height:1.4;color:var(--tx);
}
.tx-ta:focus{cursor:text;background:var(--s)cc;border-radius:6px;box-shadow:0 0 0 2px var(--ac)55;}

/* image */
.im{overflow:hidden;height:100%;border-radius:8px;}
.im img{width:100%;height:100%;object-fit:contain;pointer-events:none;display:block;}

/* ── RESIZE HANDLES ── */
.rh{position:absolute;width:9px;height:9px;background:var(--s);border:2px solid var(--ac);border-radius:2px;z-index:10;transition:transform .1s;}
.rh:hover{transform:scale(1.5)!important;background:var(--ac);}
.rh.nw{top:-5px;left:-5px;cursor:nw-resize;}
.rh.ne{top:-5px;right:-5px;cursor:ne-resize;}
.rh.sw{bottom:-5px;left:-5px;cursor:sw-resize;}
.rh.se{bottom:-5px;right:-5px;cursor:se-resize;}
.rh.n{top:-5px;left:calc(50% - 4px);cursor:n-resize;}
.rh.s{bottom:-5px;left:calc(50% - 4px);cursor:s-resize;}
.rh.e{right:-5px;top:calc(50% - 4px);cursor:e-resize;}
.rh.w{left:-5px;top:calc(50% - 4px);cursor:w-resize;}

/* ── POPUPS ── */
.pop{
  position:fixed;background:var(--s);border:1px solid var(--bdr);border-radius:14px;
  padding:13px;z-index:700;display:none;
}
.pop h5{
  font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;
  color:var(--tx3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px;
}
.sw-g{display:flex;flex-wrap:wrap;gap:6px;max-width:180px;}
.sw{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .13s,border-color .13s;}
.sw:hover{transform:scale(1.2);}
.sw.on{border-color:var(--tx)!important;transform:scale(1.1);}
.szr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.szr label{font-size:11px;color:var(--tx2);min-width:50px;font-family:'Space Grotesk',sans-serif;}
.szr input[type=range]{flex:1;-webkit-appearance:none;height:3px;background:var(--bdr2);border-radius:3px;outline:none;cursor:pointer;}
.szr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--ac);cursor:pointer;box-shadow:0 0 0 3px var(--ac)22;}
.szr span{font-size:11px;color:var(--tx2);min-width:28px;text-align:right;font-family:'Space Grotesk',sans-serif;}
.sgg{display:grid;grid-template-columns:repeat(4,38px);gap:5px;}
.sgb{width:38px;height:38px;border:1.5px solid var(--bdr);border-radius:9px;background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .13s;}
.sgb:hover{border-color:var(--ac);background:var(--s3);}

/* ── CTX MENU ── */
#ctx{
  position:fixed;background:var(--s);border:1px solid var(--bdr);border-radius:11px;
  padding:5px;z-index:800;display:none;min-width:162px;
}
.ci{padding:7px 12px;font-size:12px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:9px;color:var(--tx);transition:background .1s;font-family:'Space Grotesk',sans-serif;}
.ci:hover{background:var(--s2);}
.ci.del{color:#e53e3e;}.ci.del:hover{background:#fff0f0;}
[data-theme="dark"] .ci.del:hover{background:#3a1010;}
.csep{height:1px;background:var(--bdr);margin:3px 0;}

/* ── ZOOM BAR ── */
#zbar{
  position:fixed;bottom:14px;right:14px;
  background:var(--s);border:1px solid var(--bdr);border-radius:10px;
  display:flex;align-items:center;gap:2px;padding:4px 6px;z-index:400;
}
.zb{width:26px;height:26px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-size:16px;color:var(--tx2);display:flex;align-items:center;justify-content:center;transition:all .12s;}
.zb:hover{background:var(--s2);color:var(--tx);}
#zv{font-size:11px;font-weight:600;color:var(--tx2);min-width:42px;text-align:center;font-family:'Space Grotesk',sans-serif;}

/* ── ERASER CURSOR ── */
#erc{position:fixed;border:2px solid var(--ac);border-radius:50%;pointer-events:none;display:none;z-index:9999;transform:translate(-50%,-50%);background:var(--ac)18;}

/* ── TOAST ── */
#toast{
  position:fixed;top:62px;left:50%;transform:translateX(-50%);
  background:var(--tip-bg);color:var(--tip-tx);
  font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:500;
  padding:7px 16px;border-radius:20px;z-index:2000;opacity:0;pointer-events:none;
  transition:opacity .2s;box-shadow:0 4px 16px var(--sh2);
}
#toast.on{opacity:1;}

/* ── WATERMARK (board center hint) ── */
#wm{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  display:flex;flex-direction:column;align-items:center;gap:8px;
  pointer-events:none;opacity:.15;user-select:none;
}
#wm-logo{font-family:'Syne',sans-serif;font-size:56px;font-weight:700;color:var(--ac);line-height:1;letter-spacing:-2px;}
#wm-sub{font-family:'Space Grotesk',sans-serif;font-size:15px;color:var(--tx2);letter-spacing:.3px;}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div id="hdr">
  <div id="logo">
    <span id="logo-text">DoodleIt</span>
  </div>
  <input id="bname" value="Untitled Board" spellcheck="false"/>
  <div class="sp"></div>
  <button class="hb sq" id="u-btn" title="Undo">↩</button>
  <button class="hb sq" id="r-btn" title="Redo">↪</button>
  <button class="hb sq" id="theme-btn" title="Toggle theme">🌙</button>
  <button class="hb" id="exp-btn">📤 Export PNG</button>
  <button class="hb pri" id="fit-btn">⊡ Fit</button>
</div>

<!-- ═══ TOOLBAR ═══ -->
<div id="tb">
  <button class="tbt on" data-t="sel"><svg viewBox="0 0 24 24"><path d="M5 3l14 9.5-7 .5-4 7z" stroke-linejoin="round"/></svg><span class="tt">Select  V</span></button>
  <div class="tsep"></div>
  <button class="tbt" data-t="pen"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4z"/></svg><span class="tt">Pen  P</span></button>
  <button class="tbt" data-t="shapes"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><circle cx="17.5" cy="6.5" r="3.5"/><path d="M3 21l4-7 4 7"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span class="tt">Shapes  S</span></button>
  <button class="tbt" data-t="sticky"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h7l7-7V4a2 2 0 00-2-2z"/><path d="M14 2v7h7"/></svg><span class="tt">Sticky  N</span></button>
  <button class="tbt" data-t="text"><svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg><span class="tt">Text  T</span></button>
  <button class="tbt" data-t="line"><svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="15 5 19 5 19 9"/></svg><span class="tt">Arrow  A</span></button>
  <button class="tbt" id="t-img"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><span class="tt">Image</span></button>
  <div class="tsep"></div>
  <button class="tbt" id="t-col"><div id="col-dot"></div><span class="tt">Color</span></button>
  <button class="tbt" id="t-sz"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.5"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/></svg><span class="tt">Stroke Size</span></button>
  <div class="tsep"></div>
  <button class="tbt" data-t="eraser"><svg viewBox="0 0 24 24"><path d="M20 20H7L3 16l14-14 7 7-4 11z"/><path d="M6.8 13.8l4 4"/></svg><span class="tt">Eraser  E</span></button>
  <button class="tbt" id="t-clr"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg><span class="tt">Clear All</span></button>
</div>

<!-- ═══ VIEWPORT ═══ -->
<div id="vp">
  <div id="board">
    <svg id="cv" xmlns="http://www.w3.org/2000/svg" width="6000" height="6000"></svg>
    <svg id="lsvg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="ol"></div>
    <div id="rb"></div>
    <!-- Watermark -->
    <div id="wm">
      <div id="wm-logo">DoodleIt</div>
      <div id="wm-sub">Start drawing · Press P for pen · N for sticky note</div>
    </div>
  </div>
</div>

<!-- ═══ POPUPS ═══ -->
<div class="pop" id="pop-col">
  <h5>Color</h5>
  <div class="sw-g" id="col-sw"></div>
  <div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-size:11px;color:var(--tx2);font-family:'Space Grotesk',sans-serif;">
    Custom <input type="color" id="col-cust" style="width:26px;height:26px;border:none;border-radius:50%;padding:0;cursor:pointer;background:none;"/>
  </div>
</div>
<div class="pop" id="pop-sz">
  <h5>Stroke</h5>
  <div class="szr"><label>Size</label><input type="range" id="sz-r" min="1" max="40" value="3" step="1"/><span id="sz-v">3</span></div>
  <div class="szr"><label>Opacity</label><input type="range" id="op-r" min="5" max="100" value="100" step="1"/><span id="op-v">100%</span></div>
</div>
<div class="pop" id="pop-sh">
  <h5>Insert shape</h5>
  <div class="sgg" id="sgg"></div>
</div>
<div class="pop" id="pop-sn">
  <h5>Sticky color</h5>
  <div class="sw-g" id="sn-sw"></div>
</div>

<!-- ═══ CTX MENU ═══ -->
<div id="ctx">
  <div class="ci" id="ci-dup">⧉  Duplicate</div>
  <div class="ci" id="ci-cp">📋  Copy</div>
  <div class="ci" id="ci-pa">📌  Paste</div>
  <div class="csep"></div>
  <div class="ci" id="ci-fr">↑  Bring to front</div>
  <div class="ci" id="ci-bk">↓  Send to back</div>
  <div class="csep"></div>
  <div class="ci del" id="ci-dl">🗑  Delete</div>
</div>

<!-- ═══ ZOOM ═══ -->
<div id="zbar">
  <button class="zb" id="z-out">−</button>
  <span id="zv">100%</span>
  <button class="zb" id="z-in">+</button>
</div>

<div id="erc"></div>
<div id="toast"></div>
<input type="file" id="file-in" accept="image/*" style="display:none"/>

<script>

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
const vp   = document.getElementById('vp');
const board= document.getElementById('board');
const cvEl = document.getElementById('cv');
const lsvg = document.getElementById('lsvg');
const ol   = document.getElementById('ol');
const rb   = document.getElementById('rb');
const erc  = document.getElementById('erc');

let SC=1, TX=0, TY=0;
let tool='sel';
let pCol='#1a1830', pSz=3, pOp=1;
let isDark=false;

let objs=[], strokes=[], selIds=new Set(), clipbd=null;
let hist=[], hIdx=-1, oid=1;

let panning=false, pSX=0,pSY=0,pTX=0,pTY=0, spaceDn=false; // kept for compat but pan disabled
let selboxing=false, sbX0=0,sbY0=0;
let penDn=false, penPts=[];
let lineDn=false, lineSX=0,lineSY=0;
let eraserDn=false;
let dragging=false, dSX=0,dSY=0, dSnap={};
let ctxO=null, pendSn=null;
let liveEl=null;

// ══════════════════════════════════════════════════════
// SVG HELPER
// ══════════════════════════════════════════════════════
function mkSVG(tag){ return document.createElementNS('http://www.w3.org/2000/svg',tag); }
function n(v){ return (+v).toFixed(1); }

// ══════════════════════════════════════════════════════
// GRID — rich dot grid that matches Miro style
// ══════════════════════════════════════════════════════
function buildGrid(){
  cvEl.innerHTML='';
  const bgCol  = isDark ? '#0f0e1a' : '#eeedf5';
  const dot1   = isDark ? '#28264a' : '#b8b4d8';  // main dot — visible
  const dot2   = isDark ? '#1e1c38' : '#d4d0ee';  // sub dot — subtle

  const bg=mkSVG('rect'); bg.setAttribute('width','6000'); bg.setAttribute('height','6000');
  bg.setAttribute('fill',bgCol); bg.id='grid-bg'; cvEl.appendChild(bg);

  const defs=mkSVG('defs');
  const pat=mkSVG('pattern');
  pat.setAttribute('id','dotpat'); pat.setAttribute('width','28'); pat.setAttribute('height','28');
  pat.setAttribute('patternUnits','userSpaceOnUse');

  const d1=mkSVG('circle');
  d1.setAttribute('cx','0'); d1.setAttribute('cy','0'); d1.setAttribute('r','1.8');
  d1.setAttribute('fill',dot1); pat.appendChild(d1);

  const d2=mkSVG('circle');
  d2.setAttribute('cx','14'); d2.setAttribute('cy','14'); d2.setAttribute('r','1');
  d2.setAttribute('fill',dot2); pat.appendChild(d2);

  defs.appendChild(pat); cvEl.appendChild(defs);

  const gr=mkSVG('rect');
  gr.setAttribute('width','6000'); gr.setAttribute('height','6000');
  gr.setAttribute('fill','url(#dotpat)'); cvEl.appendChild(gr);

  const sg=mkSVG('g'); sg.id='stroke-g'; cvEl.appendChild(sg);
}

// ══════════════════════════════════════════════════════
// TRANSFORM
// ══════════════════════════════════════════════════════
function applyT(){
  board.style.transform=`translate(${n(TX)}px,${n(TY)}px) scale(${SC})`;
  document.getElementById('zv').textContent=Math.round(SC*100)+'%';
}
function vp2b(vx,vy){ return {x:(vx-TX)/SC, y:(vy-TY)/SC}; }
function ev2b(e){ const r=vp.getBoundingClientRect(); return vp2b(e.clientX-r.left,e.clientY-r.top); }

// ══════════════════════════════════════════════════════
// SMOOTH PATH
// ══════════════════════════════════════════════════════
function catmull(pts){
  if(!pts||pts.length<2) return '';
  let d=`M${n(pts[0][0])} ${n(pts[0][1])}`;
  if(pts.length===2) return d+` L${n(pts[1][0])} ${n(pts[1][1])}`;
  for(let i=0;i<pts.length-1;i++){
    const p0=pts[Math.max(i-1,0)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(i+2,pts.length-1)];
    const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
    const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
    d+=` C${n(c1x)} ${n(c1y)} ${n(c2x)} ${n(c2y)} ${n(p2[0])} ${n(p2[1])}`;
  }
  return d;
}

// ══════════════════════════════════════════════════════
// ADD STROKE TO SVG
// ══════════════════════════════════════════════════════
function addStroke(obj){
  const sg=document.getElementById('stroke-g');
  const g=mkSVG('g'); g.id='sk-'+obj.id; g.setAttribute('data-id',obj.id);

  if(obj.type==='pen'){
    const p=mkSVG('path');
    p.setAttribute('d',catmull(obj.pts));
    p.setAttribute('stroke',obj.col); p.setAttribute('stroke-width',obj.sw);
    p.setAttribute('stroke-linecap','round'); p.setAttribute('stroke-linejoin','round');
    p.setAttribute('fill','none'); p.setAttribute('opacity',obj.op);
    g.appendChild(p);
  } else if(obj.type==='line'){
    const l=mkSVG('line');
    l.setAttribute('x1',n(obj.x1)); l.setAttribute('y1',n(obj.y1));
    l.setAttribute('x2',n(obj.x2)); l.setAttribute('y2',n(obj.y2));
    l.setAttribute('stroke',obj.col); l.setAttribute('stroke-width',obj.sw);
    l.setAttribute('stroke-linecap','round'); l.setAttribute('opacity',obj.op);
    g.appendChild(l);
    const ang=Math.atan2(obj.y2-obj.y1,obj.x2-obj.x1);
    const hs=Math.max(10,obj.sw*4.5);
    const poly=mkSVG('polygon');
    const ap=[[obj.x2,obj.y2],[obj.x2-hs*Math.cos(ang-.38),obj.y2-hs*Math.sin(ang-.38)],[obj.x2-hs*Math.cos(ang+.38),obj.y2-hs*Math.sin(ang+.38)]];
    poly.setAttribute('points',ap.map(p=>p.map(v=>n(v)).join(',')).join(' '));
    poly.setAttribute('fill',obj.col); poly.setAttribute('opacity',obj.op);
    g.appendChild(poly);
  }

  g.style.cursor='pointer';
  g.addEventListener('pointerdown',ev=>{
    if(tool!=='sel') return;
    ev.stopPropagation();
    const s=strokes.find(x=>x.id===obj.id);
    if(s) selStroke(s,ev.shiftKey);
  });
  sg.appendChild(g);
}

function removeStroke(id){
  const el=document.getElementById('sk-'+id); if(el) el.remove();
}

function startLiveLine(x1,y1){

// RENDER DOM OBJECT
// ══════════════════════════════════════════════════════
function renderObj(obj){

  if(obj.type==='sticky'){
    const d=document.createElement('div');

    d.style.cssText=`background:${obj.bg};color:${obj.tc};width:100%;height:100%;`;
    const ta=document.createElement('textarea');

    ta.style.color=obj.tc;
    ta.addEventListener('input',()=>obj.text=ta.value);

    const ft=document.createElement('div'); ft.className='sn-foot';
    const dot=document.createElement('div'); dot.className='sn-dot';
    dot.style.background=obj.tc;
    dot.addEventListener('click',e=>{e.stopPropagation();openSnPicker(obj,e);});
    ft.appendChild(dot); d.appendChild(ta); d.appendChild(ft); el.appendChild(d);

  } else if(obj.type==='shape'){
    const d=document.createElement('div'); d.className='oi sh';
    d.innerHTML=mkShapeSVG(obj); el.appendChild(d);

  } else if(obj.type==='text'){
    const ta=document.createElement('textarea');
    ta.className='oi tx-ta'; ta.value=obj.text||''; ta.placeholder='Type here…';
    ta.style.cssText=`font-size:${obj.fs||20}px;color:${obj.col||pCol};width:100%;height:100%;`;
    ta.addEventListener('input',()=>obj.text=ta.value);
    ta.addEventListener('pointerdown',e=>e.stopPropagation());
    el.appendChild(ta);

  } else if(obj.type==='img'){
    const d=document.createElement('div'); d.className='oi im';
    d.style.cssText='width:100%;height:100%;';
    const img=document.createElement('img'); img.src=obj.src;
    d.appendChild(img); el.appendChild(d);
  }

  el.addEventListener('pointerdown',e=>handlePD(e,obj));
  el.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();openCtx(e,obj);});
  el.addEventListener('dblclick',e=>{const ta=el.querySelector('textarea');if(ta){ta.focus();e.stopPropagation();}});
  ol.appendChild(el);
  if(selIds.has(obj.id)) addHandles(obj);
}

function mkShapeSVG(obj){
  const w=obj.w,h=obj.h,sw=Math.max(1,obj.sw||2),sc=obj.sc||pCol,fc=obj.fc||'none',p=sw+2;
  const H=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${w} ${h}" style="width:100%;height:100%">`;
  const F='</svg>';
  if(obj.shape==='rect')    return `${H}<rect x="${p}" y="${p}" width="${w-p*2}" height="${h-p*2}" rx="6" stroke="${sc}" stroke-width="${sw}" fill="${fc}"/>${F}`;
  if(obj.shape==='circle')  return `${H}<ellipse cx="${w/2}" cy="${h/2}" rx="${w/2-p}" ry="${h/2-p}" stroke="${sc}" stroke-width="${sw}" fill="${fc}"/>${F}`;
  if(obj.shape==='tri')     return `${H}<polygon points="${w/2},${p} ${w-p},${h-p} ${p},${h-p}" stroke="${sc}" stroke-width="${sw}" fill="${fc}" stroke-linejoin="round"/>${F}`;
  if(obj.shape==='diamond') return `${H}<polygon points="${w/2},${p} ${w-p},${h/2} ${w/2},${h-p} ${p},${h/2}" stroke="${sc}" stroke-width="${sw}" fill="${fc}" stroke-linejoin="round"/>${F}`;
  if(obj.shape==='star'){
    const cx=w/2,cy=h/2,ro=Math.min(w,h)/2-p,ri=ro*.42;
    let pts='';for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2,r=i%2?ri:ro;pts+=`${n(cx+r*Math.cos(a))},${n(cy+r*Math.sin(a))} `;}
    return `${H}<polygon points="${pts.trim()}" stroke="${sc}" stroke-width="${sw}" fill="${fc}" stroke-linejoin="round"/>${F}`;
  }
  if(obj.shape==='hex'){
    const cx=w/2,cy=h/2,r=Math.min(w,h)/2-p;
    let pts='';for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;pts+=`${n(cx+r*Math.cos(a))},${n(cy+r*Math.sin(a))} `;}
    return `${H}<polygon points="${pts.trim()}" stroke="${sc}" stroke-width="${sw}" fill="${fc}" stroke-linejoin="round"/>${F}`;
  }
  if(obj.shape==='arrow'){
    const mid=h/2,th=h*.22;
    return `${H}<polygon points="${p},${n(mid-th)} ${n(w*.62)},${n(mid-th)} ${n(w*.62)},${p} ${w-p},${mid} ${n(w*.62)},${h-p} ${n(w*.62)},${n(mid+th)} ${p},${n(mid+th)}" stroke="${sc}" stroke-width="${sw}" fill="${fc}" stroke-linejoin="round"/>${F}`;
  }
  if(obj.shape==='speech')  return `${H}<path d="M${p},${p} Q${p},${n(h*.68)} ${p},${n(h*.7)} L${n(w*.2)},${n(h*.7)} L${n(w*.27)},${h-p} L${n(w*.42)},${n(h*.7)} Q${w-p},${n(h*.7)} ${w-p},${p} Z" stroke="${sc}" stroke-width="${sw}" fill="${fc}"/>${F}`;
  return `${H}<rect x="${p}" y="${p}" width="${w-p*2}" height="${h-p*2}" rx="6" stroke="${sc}" stroke-width="${sw}" fill="${fc}"/>${F}`;
}

// ══════════════════════════════════════════════════════
// SELECTION
// ══════════════════════════════════════════════════════
function addHandles(obj){
  const el=document.getElementById('ob-'+obj.id); if(!el) return;
  el.classList.add('sel');
  document.querySelectorAll('.rh-'+obj.id).forEach(h=>h.remove());
  ['nw','n','ne','e','se','s','sw','w'].forEach(pos=>{
    const h=document.createElement('div');
    h.className=`rh ${pos} rh-${obj.id}`;
    h.addEventListener('pointerdown',e=>startResize(e,obj,pos));
    el.appendChild(h);
  });
}
function remHandles(id){
  const el=document.getElementById('ob-'+id); if(el) el.classList.remove('sel');
  document.querySelectorAll('.rh-'+id).forEach(h=>h.remove());
}
function clearSel(){ selIds.forEach(id=>remHandles(id)); selIds.clear(); }
function selectObj(obj,add=false){ if(!add) clearSel(); selIds.add(obj.id); addHandles(obj); }
function selStroke(s,add){
  if(!add) clearSel();
  selIds.add(s.id);
  const g=document.getElementById('sk-'+s.id);
  if(g) g.style.filter='drop-shadow(0 0 5px '+pCol+')';
}

// ══════════════════════════════════════════════════════
// DRAG
// ══════════════════════════════════════════════════════
function handlePD(e,obj){
  if(tool!=='sel') return;
  if(e.target.tagName==='TEXTAREA'||e.target.classList.contains('rh')) return;
  e.stopPropagation();
  if(!selIds.has(obj.id)) selectObj(obj,e.shiftKey);
  dragging=true; dSX=e.clientX; dSY=e.clientY; dSnap={};
  selIds.forEach(id=>{ const o=objs.find(x=>x.id===id); if(o) dSnap[id]={x:o.x,y:o.y}; });
  const onM=e2=>{
    if(!dragging) return;
    const dx=(e2.clientX-dSX)/SC,dy=(e2.clientY-dSY)/SC;
    selIds.forEach(id=>{
      const o=objs.find(x=>x.id===id); if(!o||!dSnap[id]) return;
      o.x=dSnap[id].x+dx; o.y=dSnap[id].y+dy;
      const el=document.getElementById('ob-'+id);
      if(el){el.style.left=n(o.x)+'px';el.style.top=n(o.y)+'px';}
    });
  };
  const onU=()=>{ dragging=false; saveH(); window.removeEventListener('pointermove',onM); window.removeEventListener('pointerup',onU); };
  window.addEventListener('pointermove',onM); window.addEventListener('pointerup',onU);
}

// ══════════════════════════════════════════════════════
// RESIZE
// ══════════════════════════════════════════════════════
function startResize(e,obj,pos){
  e.stopPropagation(); e.preventDefault();
  const sx=e.clientX,sy=e.clientY,st={x:obj.x,y:obj.y,w:obj.w,h:obj.h};
  const onM=e2=>{
    const dx=(e2.clientX-sx)/SC,dy=(e2.clientY-sy)/SC;
    if(pos.includes('e')) obj.w=Math.max(50,st.w+dx);
    if(pos.includes('s')) obj.h=Math.max(30,st.h+dy);
    if(pos.includes('w')){obj.x=st.x+dx;obj.w=Math.max(50,st.w-dx);}
    if(pos.includes('n')){obj.y=st.y+dy;obj.h=Math.max(30,st.h-dy);}
    renderObj(obj); addHandles(obj);
  };
  const onU=()=>{ saveH(); window.removeEventListener('pointermove',onM); window.removeEventListener('pointerup',onU); };
  window.addEventListener('pointermove',onM); window.addEventListener('pointerup',onU);
}

// ══════════════════════════════════════════════════════
// VIEWPORT EVENTS
// ══════════════════════════════════════════════════════
vp.addEventListener('pointerdown',e=>{
  if(e.button!==0) return;
  closeAll();
  const b=ev2b(e);

  if(tool==='sel'){
    clearSel();
    selboxing=true; sbX0=b.x; sbY0=b.y;
    rb.style.cssText=`display:block;left:${n(b.x)}px;top:${n(b.y)}px;width:0;height:0;`;
  } else if(tool==='pen'){
    penDn=true; penPts=[[b.x,b.y]];
    startLivePen(); updLivePen(penPts);
  } else if(tool==='line'){
    lineDn=true; lineSX=b.x; lineSY=b.y;
    startLiveLine(b.x,b.y);
  } else if(tool==='eraser'){
    eraserDn=true; eraseAt(b.x,b.y);
  } else if(tool==='sticky'){
    const o={id:'o'+(oid++),type:'sticky',x:b.x-90,y:b.y-70,w:180,h:150,bg:SNCS[0].bg,tc:SNCS[0].tc,text:'',z:topZ()+1};
    objs.push(o); renderObj(o); saveH(); clearSel(); selectObj(o);
    setTimeout(()=>{const ta=document.querySelector('#ob-'+o.id+' textarea');if(ta)ta.focus();},40);
    setTool('sel');
  } else if(tool==='text'){
    const o={id:'o'+(oid++),type:'text',x:b.x-80,y:b.y-18,w:200,h:44,text:'',fs:20,col:pCol,z:topZ()+1};
    objs.push(o); renderObj(o); saveH(); clearSel(); selectObj(o);
    setTimeout(()=>{const ta=document.querySelector('#ob-'+o.id+' textarea');if(ta)ta.focus();},40);
    setTool('sel');
  }
});

vp.addEventListener('pointermove',e=>{
  const b=ev2b(e);

  if(tool==='eraser'){
    erc.style.display='block';
    erc.style.left=e.clientX+'px'; erc.style.top=e.clientY+'px';
    const sz=Math.max(12,pSz*2.5*SC);
    erc.style.width=sz+'px'; erc.style.height=sz+'px';
  }

  if(selboxing){
    const x=Math.min(b.x,sbX0),y=Math.min(b.y,sbY0);
    rb.style.left=n(x)+'px'; rb.style.top=n(y)+'px';
    rb.style.width=n(Math.abs(b.x-sbX0))+'px'; rb.style.height=n(Math.abs(b.y-sbY0))+'px';
  } else if(penDn){
    const last=penPts[penPts.length-1];
    const dx=b.x-last[0],dy=b.y-last[1];
    if(dx*dx+dy*dy>1.2/(SC*SC)){ penPts.push([b.x,b.y]); updLivePen(penPts); }
  } else if(lineDn){
    updLiveLine(b.x,b.y);
  } else if(eraserDn){
    eraseAt(b.x,b.y);
  }
});

vp.addEventListener('pointerup',e=>{
  const b=ev2b(e);

  if(selboxing){
    selboxing=false; rb.style.display='none';
    const x1=Math.min(b.x,sbX0),y1=Math.min(b.y,sbY0),x2=Math.max(b.x,sbX0),y2=Math.max(b.y,sbY0);
    if(x2-x1>4&&y2-y1>4){
      objs.forEach(o=>{ if(o.x>=x1&&o.x<=x2&&o.y>=y1&&o.y<=y2){selIds.add(o.id);addHandles(o);} });
      strokes.forEach(s=>{ const hit=s.pts?s.pts.some(p=>p[0]>=x1&&p[0]<=x2&&p[1]>=y1&&p[1]<=y2):(s.x1>=x1&&s.x1<=x2&&s.y1>=y1&&s.y1<=y2); if(hit)selStroke(s,true); });
    }
  } else if(penDn){
    penDn=false; clearLive();
    if(penPts.length>=2){
      const s={id:'o'+(oid++),type:'pen',pts:penPts,col:pCol,sw:pSz,op:pOp};
      strokes.push(s); addStroke(s); saveH();
    }
    penPts=[];
  } else if(lineDn){
    lineDn=false; clearLive();
    const dx=b.x-lineSX,dy=b.y-lineSY;
    if(dx*dx+dy*dy>64){
      const s={id:'o'+(oid++),type:'line',x1:lineSX,y1:lineSY,x2:b.x,y2:b.y,col:pCol,sw:pSz,op:pOp};
      strokes.push(s); addStroke(s); saveH();
    }
  } else if(eraserDn){
    eraserDn=false;
  }
});

vp.addEventListener('pointerleave',()=>{
  erc.style.display='none';
  if(penDn){penDn=false;clearLive();if(penPts.length>=2){const s={id:'o'+(oid++),type:'pen',pts:penPts,col:pCol,sw:pSz,op:pOp};strokes.push(s);addStroke(s);saveH();}penPts=[];}
  if(lineDn){lineDn=false;clearLive();}
  if(eraserDn){eraserDn=false;}
});
vp.addEventListener('contextmenu',e=>e.preventDefault());

// ══════════════════════════════════════════════════════
// ERASER
// ══════════════════════════════════════════════════════
function eraseAt(bx,by){
  const r=pSz*3+4;
  strokes=strokes.filter(s=>{
    let hit=false;
    if(s.type==='pen') hit=s.pts.some(p=>Math.hypot(p[0]-bx,p[1]-by)<r);
    else if(s.type==='line') hit=ptSegDist(bx,by,s.x1,s.y1,s.x2,s.y2)<r;
    if(hit) removeStroke(s.id);
    return !hit;
  });
}
function ptSegDist(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(l2===0) return Math.hypot(px-ax,py-ay);
  const t=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/l2));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}

// ══════════════════════════════════════════════════════
// PAN & ZOOM  — ZOOM ONLY (no free pan, board stays centered)
// ══════════════════════════════════════════════════════
function centerBoard(){
  // Always keep board centered in viewport
  TX = (vp.clientWidth  - 6000*SC) / 2;
  TY = (vp.clientHeight - 6000*SC) / 2;
  // Don't let board go off-screen too far
  TX = Math.min(0, Math.max(vp.clientWidth  - 6000*SC, TX));
  TY = Math.min(0, Math.max(vp.clientHeight - 6000*SC, TY));
}

function zoomTo(factor, cx, cy){
  const newSC = Math.max(.05, Math.min(SC*factor, 8));
  // Zoom toward pointer position
  TX = cx - (cx - TX) * (newSC/SC);
  TY = cy - (cy - TY) * (newSC/SC);
  SC = newSC;
  applyT();
}

// No pan — remove startPan / doPan usage
// Space key no longer pans
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=vp.getBoundingClientRect();
  const cx=e.clientX-r.left, cy=e.clientY-r.top;
  const factor = e.deltaY<0 ? 1.1 : .909;
  zoomTo(factor, cx, cy);
},{passive:false});

document.getElementById('z-in').addEventListener('click',()=>{
  zoomTo(1.2, vp.clientWidth/2, vp.clientHeight/2);
});
document.getElementById('z-out').addEventListener('click',()=>{
  zoomTo(1/1.2, vp.clientWidth/2, vp.clientHeight/2);
});
document.getElementById('fit-btn').addEventListener('click',()=>{
  SC=1;
  TX = Math.max(0,(vp.clientWidth -600)/2);
  TY = Math.max(0,(vp.clientHeight-400)/2);
  applyT(); toast('Fit view');
});

const SHAPES=[{k:'rect',e:'⬜'},{k:'circle',e:'⭕'},{k:'tri',e:'🔺'},{k:'diamond',e:'🔷'},{k:'star',e:'⭐'},{k:'hex',e:'⬡'},{k:'arrow',e:'➡️'},{k:'speech',e:'💬'}];

  const s=hist[hIdx];objs=dc(s.objs);strokes=dc(s.strokes);

// ══════════════════════════════════════════════════════
// EXPORT PNG — VS Code compatible (no URL.createObjectURL)
// Uses inline data: URIs — works inside VS Code's sandboxed webview
// ══════════════════════════════════════════════════════
document.getElementById('exp-btn').addEventListener('click',async()=>{
  toast('Exporting…');
  await new Promise(r=>setTimeout(r,80));

  try {
    const vw=vp.clientWidth, vh=vp.clientHeight;
    const off=document.createElement('canvas');
    off.width=vw; off.height=vh;
    const cx=off.getContext('2d');

    // 1) Background
    cx.fillStyle=isDark?'#13121f':'#f0eff5';
    cx.fillRect(0,0,vw,vh);

    // 2) Dot grid (drawn directly — matches buildGrid exactly)
    const dot1=isDark?'#28264a':'#b8b4d8';
    const dot2=isDark?'#1e1c38':'#d4d0ee';
    const gs=28*SC;
    const ox2=((TX%gs)+gs)%gs, oy2=((TY%gs)+gs)%gs;
    for(let x=ox2-gs;x<vw+gs;x+=gs){
      for(let y=oy2-gs;y<vh+gs;y+=gs){
        cx.fillStyle=dot1; cx.beginPath(); cx.arc(x,y,1.8,0,Math.PI*2); cx.fill();
        cx.fillStyle=dot2; cx.beginPath(); cx.arc(x+gs/2,y+gs/2,1.0,0,Math.PI*2); cx.fill();
      }
    }

    // 3) Pen & line strokes — drawn with Canvas 2D (no SVG serialisation needed)
    cx.save();
    cx.translate(TX,TY);
    cx.scale(SC,SC);
    strokes.forEach(s=>{
      cx.globalAlpha=parseFloat(s.op)||1;
      cx.strokeStyle=s.col; cx.fillStyle=s.col;
      cx.lineCap='round'; cx.lineJoin='round';
      cx.lineWidth=parseFloat(s.sw)||2;
      if(s.type==='pen'&&s.pts&&s.pts.length>=2){
        cx.beginPath();
        cx.moveTo(s.pts[0][0],s.pts[0][1]);
        for(let i=0;i<s.pts.length-1;i++){
          const p0=s.pts[Math.max(i-1,0)],p1=s.pts[i],p2=s.pts[i+1],p3=s.pts[Math.min(i+2,s.pts.length-1)];
          const c1x=p1[0]+(p2[0]-p0[0])/6,c1y=p1[1]+(p2[1]-p0[1])/6;
          const c2x=p2[0]-(p3[0]-p1[0])/6,c2y=p2[1]-(p3[1]-p1[1])/6;
          cx.bezierCurveTo(c1x,c1y,c2x,c2y,p2[0],p2[1]);
        }
        cx.stroke();
      } else if(s.type==='line'){
        cx.beginPath(); cx.moveTo(s.x1,s.y1); cx.lineTo(s.x2,s.y2); cx.stroke();
        const ang=Math.atan2(s.y2-s.y1,s.x2-s.x1),hs=Math.max(10,(parseFloat(s.sw)||2)*4.5);
        cx.beginPath();
        cx.moveTo(s.x2,s.y2);
        cx.lineTo(s.x2-hs*Math.cos(ang-.38),s.y2-hs*Math.sin(ang-.38));
        cx.lineTo(s.x2-hs*Math.cos(ang+.38),s.y2-hs*Math.sin(ang+.38));
        cx.closePath(); cx.fill();
      }
    });
    cx.restore();
    cx.globalAlpha=1;

    // 4) DOM objects — drawn natively onto canvas (no SVG blob needed)
    const vpR=vp.getBoundingClientRect();
    for(const obj of objs){
      const el=document.getElementById('ob-'+obj.id); if(!el) continue;
      const r=el.getBoundingClientRect();
      const ex=r.left-vpR.left, ey=r.top-vpR.top, ew=r.width, eh=r.height;

      if(obj.type==='sticky'){
        cx.save();
        cx.shadowColor='rgba(0,0,0,.18)'; cx.shadowBlur=8; cx.shadowOffsetY=3;
        cx.fillStyle=obj.bg;
        _rrect(cx,ex,ey,ew,eh,8); cx.fill();
        cx.restore();
        cx.save();
        cx.fillStyle=obj.tc;
        cx.font=`600 ${Math.round(16*SC)}px 'Caveat',cursive`;
        const lns=(obj.text||'').split('\n'), lh=Math.round(17*SC);
        lns.forEach((l,i)=>cx.fillText(l,ex+9*SC,ey+26*SC+i*lh));
        cx.restore();

      } else if(obj.type==='shape'){
        // Draw shape directly — canvas primitives only, no SVG
        const sw=(obj.sw||2)*SC, sc2=obj.sc||pCol, fc=obj.fc||'none';
        cx.save(); cx.strokeStyle=sc2; cx.lineWidth=sw; cx.lineJoin='round';
        cx.fillStyle=fc==='none'?'rgba(0,0,0,0)':fc;
        const p=sw+2;
        cx.beginPath();
        if(obj.shape==='rect'){ _rrect(cx,ex+p,ey+p,ew-p*2,eh-p*2,6*SC); }
        else if(obj.shape==='circle'){ cx.ellipse(ex+ew/2,ey+eh/2,Math.max(1,ew/2-p),Math.max(1,eh/2-p),0,0,Math.PI*2); }
        else if(obj.shape==='tri'){ cx.moveTo(ex+ew/2,ey+p); cx.lineTo(ex+ew-p,ey+eh-p); cx.lineTo(ex+p,ey+eh-p); cx.closePath(); }
        else if(obj.shape==='diamond'){ cx.moveTo(ex+ew/2,ey+p); cx.lineTo(ex+ew-p,ey+eh/2); cx.lineTo(ex+ew/2,ey+eh-p); cx.lineTo(ex+p,ey+eh/2); cx.closePath(); }
        else if(obj.shape==='star'){
          const scx=ex+ew/2,scy=ey+eh/2,ro=Math.min(ew,eh)/2-p,ri=ro*.42;
          for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2,r2=i%2?ri:ro;i===0?cx.moveTo(scx+r2*Math.cos(a),scy+r2*Math.sin(a)):cx.lineTo(scx+r2*Math.cos(a),scy+r2*Math.sin(a));}
          cx.closePath();
        }
        else if(obj.shape==='hex'){
          const hcx=ex+ew/2,hcy=ey+eh/2,hr=Math.min(ew,eh)/2-p;
          for(let i=0;i<6;i++){const a=i*Math.PI/3-Math.PI/6;i===0?cx.moveTo(hcx+hr*Math.cos(a),hcy+hr*Math.sin(a)):cx.lineTo(hcx+hr*Math.cos(a),hcy+hr*Math.sin(a));}
          cx.closePath();
        }
        else{ _rrect(cx,ex+p,ey+p,ew-p*2,eh-p*2,6*SC); }
        if(fc!=='none') cx.fill();
        cx.stroke();
        cx.restore();

      } else if(obj.type==='text'){
        if(!(obj.text||'').trim()) continue;
        cx.save();
        cx.fillStyle=obj.col||pCol;
        cx.font=`600 ${Math.round((obj.fs||20)*SC)}px 'Caveat',cursive`;
        const lns=(obj.text||'').split('\n'), lh=Math.round((obj.fs||20)*SC*1.4);
        lns.forEach((l,i)=>cx.fillText(l,ex+4,ey+lh+i*lh));
        cx.restore();

      } else if(obj.type==='img'){
        const imgEl=el.querySelector('img');
        if(imgEl&&imgEl.complete&&imgEl.naturalWidth>0){
          cx.save(); cx.beginPath();
          cx.roundRect(ex,ey,ew,eh,8); cx.clip();
          cx.drawImage(imgEl,ex,ey,ew,eh);
          cx.restore();
        }
      }
    }

    // 5) Download — use data URI directly (no createObjectURL)
    const dataURL=off.toDataURL('image/png');
    const a=document.createElement('a');
    a.download='doodleit-'+Date.now()+'.png';
    a.href=dataURL;
    a.click();
    toast('Exported!');

  } catch(err){
    console.error('Export error:',err);
    toast('Export failed: '+err.message);
  }
});

function _rrect(cx,x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y); cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r); cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h); cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r); cx.quadraticCurveTo(x,y,x+r,y);
  cx.closePath();
}



// ══════════════════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  const tag=e.target.tagName;
  if(tag==='TEXTAREA'||tag==='INPUT') return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();return;}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();redo();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='c'){if(selIds.size===1){const o=objs.find(x=>x.id===selIds.values().next().value);if(o){clipbd=dc(o);toast('Copied');}}return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='v'){if(clipbd){const o=dc(clipbd);o.id='o'+(oid++);o.x=(o.x||0)+18;o.y=(o.y||0)+18;o.z=topZ()+1;objs.push(o);renderObj(o);saveH();clearSel();selectObj(o);}return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();if(selIds.size===1){const o=objs.find(x=>x.id===selIds.values().next().value);if(o)dup(o);}return;}
  if(e.key==='Delete'||e.key==='Backspace'){
    const toSave=selIds.size>0;
    selIds.forEach(id=>{const si=strokes.findIndex(s=>s.id===id);if(si>-1){removeStroke(id);strokes.splice(si,1);}else delObj(id);});
    if(toSave){const c=dc(selIds);selIds.clear();saveH();}
    return;
  }
  if(e.key==='Escape'){clearSel();return;}
  const tm={v:'sel',p:'pen',n:'sticky',t:'text',a:'line',e:'eraser'};
  if(!e.ctrlKey&&!e.metaKey&&tm[e.key]) setTool(tm[e.key]);
  if(e.key==='+'||e.key==='='){SC=Math.min(SC*1.15,8);applyT();}
  if(e.key==='-'){SC=Math.max(SC/1.15,.05);applyT();}
  if(e.key==='0'){SC=1;TX=Math.max(0,(vp.clientWidth-600)/2);TY=Math.max(0,(vp.clientHeight-400)/2);applyT();}
});
document.addEventListener('keyup',e=>{});

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function topZ(){return Math.max(0,...objs.map(o=>o.z||0),0);}
function dc(x){return JSON.parse(JSON.stringify(x));}
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2200);}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
buildGrid();
TX=Math.max(0,(vp.clientWidth-600)/2);
TY=Math.max(0,(vp.clientHeight-400)/2);
applyT(); saveH(); setTool('sel'); updDot();
</script>
